<!-- Laser pointer -->
<script>
(function(){
  const dot = document.createElement('div');
  dot.className = 'laser-dot';
  document.body.appendChild(dot);
  let active = false;
  const btn = document.getElementById('laser-btn');

  window.toggleLaser = function() {
    active = !active;
    btn.classList.toggle('active', active);
    document.body.classList.toggle('laser-active', active);
    dot.style.display = active ? 'block' : 'none';
  };

  /* ── Fullscreen toggle ─────────────────────────────────── */
  const fsBtn = document.getElementById('fullscreen-btn');
  window.toggleFS = function() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      var el = document.documentElement;
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  };
  function syncFSBtn() {
    var fs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsBtn.classList.toggle('active', fs);
  }
  document.addEventListener('fullscreenchange', syncFSBtn);
  document.addEventListener('webkitfullscreenchange', syncFSBtn);

  document.addEventListener('mousemove', function(e) {
    if (!active) return;
    dot.style.left = e.clientX + 'px';
    dot.style.top  = e.clientY + 'px';
  });

  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'KeyL' && !e.ctrlKey && !e.metaKey) { toggleLaser(); e.preventDefault(); }
    if (e.code === 'KeyF' && !e.ctrlKey && !e.metaKey) { toggleFS(); e.preventDefault(); }
  });
})();
</script>

<!-- inline scripts: chapter2.html -->
<script>
/* ── Interactive Parameter Playground ─────────────────────── */
const paramOutputs = {
  cold: [
    "The ocean is a vast body of saltwater that covers approximately 71 percent of the Earth's surface.",
    "The ocean is a large body of saltwater that covers most of the Earth's surface and plays a vital role in regulating the planet's climate.",
    "The ocean is an immense, continuous body of saltwater covering over 70% of Earth's surface.",
  ],
  balanced: [
    "The ocean is a shimmering expanse of blue that connects continents and harbors an astonishing diversity of life beneath its waves.",
    "Stretching beyond every horizon, the ocean pulses with tides, storms, and hidden ecosystems that sustain life across the globe.",
    "The ocean is nature's great equalizer — a restless, salt-laced wilderness that shapes weather, feeds billions, and guards secrets in its abyss.",
  ],
  hot: [
    "The ocean is a dreaming leviathan of turquoise whispers, swallowing horizons and exhaling fog that tastes of forgotten voyages and salt-drunk stars.",
    "Imagine liquid twilight stretching infinitely — the ocean hums in frequencies only whales and poets understand, folding time into its cerulean belly.",
    "The ocean? A tantrum of cobalt and emerald, gargling shipwrecks like throat lozenges, forever arguing with the moon about who pulls harder.",
  ],
};
const paramTokens = {
  cold:     [{w:'vast',pct:89},{w:'large',pct:6},{w:'immense',pct:3},{w:'deep',pct:1},{w:'endless',pct:1}],
  balanced: [{w:'shimmering',pct:34},{w:'vast',pct:25},{w:'restless',pct:18},{w:'mysterious',pct:14},{w:'boundless',pct:9}],
  hot:      [{w:'dreaming',pct:15},{w:'liquid',pct:14},{w:'tantrum',pct:13},{w:'cobalt',pct:12},{w:'whispering',pct:11}],
};

function updateParamDemo() {
  const temp = (document.getElementById('tempSlider').value / 10).toFixed(1);
  const topp = (document.getElementById('toppSlider').value / 10).toFixed(1);
  document.getElementById('tempValue').textContent = temp;
  document.getElementById('toppValue').textContent = topp;

  let mode = 'balanced';
  let label = '⚖️ Balanced';
  if (temp <= 0.3) { mode = 'cold'; label = '🎯 Precise / Deterministic'; }
  else if (temp >= 1.2) { mode = 'hot'; label = '🎨 Creative / Wild'; }
  document.getElementById('paramBehavior').textContent = label;

  const outputs = paramOutputs[mode];
  const idx = Math.floor(Math.random() * outputs.length);
  const outEl = document.getElementById('paramOutput');
  outEl.style.opacity = '0';
  setTimeout(() => {
    outEl.textContent = outputs[idx];
    outEl.style.opacity = '1';
    outEl.style.transition = 'opacity .35s';
  }, 150);

  // Token bars
  const bars = document.getElementById('paramBars');
  const tokens = paramTokens[mode];
  bars.innerHTML = '';
  tokens.forEach(t => {
    const col = document.createElement('div');
    col.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;';
    const bar = document.createElement('div');
    bar.style.cssText = 'width:100%;border-radius:4px 4px 0 0;background:var(--accent);transition:height .4s;';
    bar.style.height = Math.max(t.pct * 0.55, 4) + 'px';
    bar.style.opacity = Math.max(t.pct / 100 + 0.3, 0.35);
    const pct = document.createElement('div');
    pct.style.cssText = 'font-family:var(--mono);font-size:.5rem;color:var(--ink-mute);';
    pct.textContent = t.pct + '%';
    const word = document.createElement('div');
    word.style.cssText = 'font-family:var(--mono);font-size:.5rem;color:var(--ink-mid);';
    word.textContent = t.w;
    col.appendChild(pct);
    col.appendChild(bar);
    col.appendChild(word);
    bars.appendChild(col);
  });
}

// Initialize on load
document.addEventListener('DOMContentLoaded', () => setTimeout(updateParamDemo, 300));
</script>
